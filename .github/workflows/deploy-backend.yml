name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Ambiente destino'
        required: true
        default: 'dev'
        type: choice
        options: [dev, stage, prod]
  push:
    branches: [main, master]
    paths:
      - "app/backend/**"
      - ".github/workflows/deploy-backend.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------- Tests previos al deploy ----------
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install backend dependencies
        run: npm ci
        working-directory: app/backend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: app/backend

      - name: Tests
        run: npm test
        working-directory: app/backend

      - name: Audit (high)
        run: npm audit --audit-level=high --omit=dev
        working-directory: app/backend

  # ---------- Deploy a dev (automático en push a main) ----------
  deploy-dev:
    needs: quality-gate
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'dev')
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install backend dependencies
        run: npm ci
        working-directory: app/backend

      - name: Validate secrets
        run: |
          if [[ -z "$AWS_ACCESS_KEY_ID" || -z "$AWS_SECRET_ACCESS_KEY" || -z "$SERVERLESS_ACCESS_KEY" ]]; then
            echo "::error::Faltan secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SERVERLESS_ACCESS_KEY"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy → dev
        working-directory: app/backend
        run: npx serverless deploy --stage dev --region $AWS_REGION

      - name: Smoke test dev
        run: |
          URL="https://bhyrxu22xc.execute-api.us-east-1.amazonaws.com/dev/v1/products?limit=1"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Smoke test failed — GET /v1/products returned $STATUS"
            exit 1
          fi
          echo "Smoke test passed ($STATUS)"

  # ---------- Deploy a stage (manual via workflow_dispatch) ----------
  deploy-stage:
    needs: quality-gate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'stage'
    runs-on: ubuntu-latest
    environment: stage
    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install backend dependencies
        run: npm ci
        working-directory: app/backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy → stage
        working-directory: app/backend
        run: npx serverless deploy --stage stage --region $AWS_REGION

  # ---------- Deploy a prod (requiere aprobación manual en GitHub Environments) ----------
  deploy-prod:
    needs: quality-gate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.stage == 'prod'
    runs-on: ubuntu-latest
    environment: prod          # requiere reviewer configurado en Settings > Environments
    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install backend dependencies
        run: npm ci
        working-directory: app/backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy → prod
        working-directory: app/backend
        run: npx serverless deploy --stage prod --region $AWS_REGION

      - name: Smoke test prod
        run: |
          echo "Prod smoke test — ajustar URL cuando se configure el ambiente prod"
